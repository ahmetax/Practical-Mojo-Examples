<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Weather App{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%);
      color: white;
      min-height: 100vh;
    }

    header {
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(8px);
    }

    header h1 { font-size: 1.4rem; }

    nav a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      transition: background 0.2s;
      margin-left: 0.3rem;
    }

    nav a:hover,
    nav a.active { background: rgba(255,255,255,0.2); }

    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]::placeholder { color: rgba(255,255,255,0.5); }
    input[type="text"]:focus { border-color: rgba(255,255,255,0.7); }

    .btn {
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #f59e0b; color: #1e3a5f; font-weight: 700; }
    .btn-light   { background: rgba(255,255,255,0.2); color: white; }

    .flash {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      background: rgba(239,68,68,0.3);
      border: 1px solid rgba(239,68,68,0.5);
    }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <h1>⛅ Weather App</h1>
    <nav>
      <a href="/" class="{{ 'active' if request.path == '/' }}">Search</a>
    </nav>
  </header>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
